model_name: "PPTSMv2"
num_classes: 3 # 根据你的动作类别数量修改
epochs: 50
batch_size: 8
learning_rate: 0.001

# 数据配置
data:
  train_list: "data/annotations/train_list.txt"
  val_list: "data/annotations/val_list.txt"
  label_list: "configs/label_list.txt"
  num_workers: 4

# 模型配置
model:
  backbone: "ResNet50"
  pretrained: true
  num_seg: 60 # 每个视频采样的帧数

# 训练配置
train:
  optimizer: "Momentum"
  momentum: 0.9
  weight_decay: 0.0001

# 数据增强
transform:
  - RandomCrop: 224
  - RandomFlip: 0.5
  - Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# 推理配置
inference:
  batch_size: 1
  top_k: 3
